      type: string
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          AIGatewayRoute combines multiple AIServiceBackends and attaching them to Gateway(s) resources.

          This serves as a way to define a "unified" AI API for a Gateway which allows downstream
          clients to use a single schema API to interact with multiple AI backends.

          Envoy AI Gateway will generate the following k8s resources corresponding to the AIGatewayRoute:

            - HTTPRoute of the Gateway API as a top-level resource to bind all backends.
              The name of the HTTPRoute is the same as the AIGatewayRoute.
            - HTTPRouteFilter of the Envoy Gateway API per namespace for automatic hostname rewrite.
              The name of the HTTPRouteFilter is `ai-eg-host-rewrite-${AIGatewayRoute.Name}`.

          All of these resources are created in the same namespace as the AIGatewayRoute. Note that this is the implementation
          detail subject to change. If you want to customize the default behavior of the Envoy AI Gateway, you can use these
          resources as a reference and create your own resources. Alternatively, you can use EnvoyPatchPolicy API of the Envoy
          Gateway to patch the generated resources. For example, you can configure the retry fallback behavior by attaching
          BackendTrafficPolicy API of Envoy Gateway to the generated HTTPRoute.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the details of the AIGatewayRoute.
            properties:
              hostnames:
                description: |-
                  Hostnames is a list of hostnames matched against the HTTP Host header to select an AIGatewayRoute
                  used to process the request. This is equivalent to the Hostnames field in the Gateway API HTTPRouteSpec.
                  When specified, the generated HTTPRoute will include these hostnames for hostname-based filtering.
                  See https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io%2fv1.HTTPRouteSpec
                  for the details of the Hostnames field in the Gateway API.
                items:
                  description: |-
                    Hostname is the fully qualified domain name of a network host. This matches
                    the RFC 1123 definition of a hostname with 2 notable exceptions:

                     1. IPs are not allowed.
                     2. A hostname may be prefixed with a wildcard label (`*.`). The wildcard
                        label must appear by itself as the first label.

                    Hostname can be "precise" which is a domain name without the terminating
                    dot of a network host (e.g. "foo.example.com") or "wildcard", which is a
                    domain name prefixed with a single wildcard label (e.g. `*.example.com`).

                    Note that as per RFC1035 and RFC1123, a *label* must consist of lower case
                    alphanumeric characters or '-', and must start and end with an alphanumeric
                    character. No other punctuation is allowed.
                  maxLength: 253
                  minLength: 1
                  pattern: ^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                  type: string
                maxItems: 16
                type: array
              llmRequestCosts:
                description: "LLMRequestCosts specifies how to capture the cost of
                  the LLM-related request, notably the token usage.\nThe AI Gateway
                  filter will capture each specified number and store it in the Envoy's
                  dynamic\nmetadata per HTTP request. The namespaced key is \"io.envoy.ai_gateway\".\n\nThese
                  route-level costs override any global defaults defined in GatewayConfig.Spec.GlobalLLMRequestCosts\nfor
                  the same metadataKey. If a metadataKey is not defined in either
                  place, no cost is calculated for it.\n\nThis allows you to define
                  common cost formulas once at the gateway level (e.g., via GatewayConfig)\nand
                  only override them in specific routes when needed (e.g., premium
                  routes with different pricing).\n\nFor example, let's say we have
                  the following LLMRequestCosts configuration:\n```yaml\n\tllmRequestCosts:\n\t-
                  metadataKey: llm_input_token\n\t  type: InputToken\n\t- metadataKey:
                  llm_output_token\n\t  type: OutputToken\n\t- metadataKey: llm_total_token\n\t
                  \ type: TotalToken\n\t- metadataKey: llm_cached_input_token\n\t
                  \ type: CachedInputToken\n- metadataKey: llm_cache_creation_input_token\n
                  \  type: CacheCreationInputToken\n```\nThen, with the following
                  BackendTrafficPolicy of Envoy Gateway, you can have three\nrate
                  limit buckets for each unique x-tenant-id header value. One bucket
                  is for the input token,\nthe other is for the output token, and
                  the last one is for the total token.\nEach bucket will be reduced
                  by the corresponding token usage captured by the AI Gateway filter.\n\n```yaml\n\tapiVersion:
                  gateway.envoyproxy.io/v1alpha1\n\tkind: BackendTrafficPolicy\n\tmetadata:\n\t
                  \ name: some-example-token-rate-limit\n\t  namespace: default\n\tspec:\n\t
                  \ targetRefs:\n\t  - group: gateway.networking.k8s.io\n\t     kind:
                  HTTPRoute\n\t     name: usage-rate-limit\n\t  rateLimit:\n\t    type:
                  Global\n\t    global:\n\t      rules:\n\t        - clientSelectors:\n\t
                  \           # Do the rate limiting based on the x-tenant-id header.\n\t
                  \           - headers:\n\t                - name: x-tenant-id\n\t
                  \                 type: Distinct\n\t          limit:\n\t            #
                  Configures the number of \"tokens\" allowed per hour.\n\t            requests:
                  10000\n\t            unit: Hour\n\t          cost:\n\t            request:\n\t
                  \             from: Number\n\t              # Setting the request
                  cost to zero allows to only check the rate limit budget,\n\t              #
                  and not consume the budget on the request path.\n\t              number:
                  0\n\t            # This specifies the cost of the response retrieved
                  from the dynamic metadata set by the AI Gateway filter.\n\t            #
                  The extracted value will be used to consume the rate limit budget,
                  and subsequent requests will be rate limited\n\t            # if
                  the budget is exhausted.\n\t            response:\n\t              from:
                  Metadata\n\t              metadata:\n\t                namespace:
                  io.envoy.ai_gateway\n\t                key: llm_input_token\n\t
                  \       - clientSelectors:\n\t            - headers:\n\t                -
                  name: x-tenant-id\n\t                  type: Distinct\n\t          limit:\n\t
                  \           requests: 10000\n\t            unit: Hour\n\t          cost:\n\t
                  \           request:\n\t              from: Number\n\t              number:
                  0\n\t            response:\n\t              from: Metadata\n\t              metadata:\n\t
                  \               namespace: io.envoy.ai_gateway\n\t                key:
                  llm_output_token\n\t        - clientSelectors:\n\t            -
                  headers:\n\t                - name: x-tenant-id\n\t                  type:
                  Distinct\n\t          limit:\n\t            requests: 10000\n\t
                  \           unit: Hour\n\t          cost:\n\t            request:\n\t
                  \             from: Number\n\t              number: 0\n\t            response:\n\t
                  \             from: Metadata\n\t              metadata:\n\t                namespace:
                  io.envoy.ai_gateway\n\t                key: llm_total_token\n```\n\nNote
                  that when multiple AIGatewayRoute resources are attached to the
                  same Gateway, and\ndifferent costs are configured for the same metadata
                  key, each route's rule is carried in\nthe filter configuration with
                  the route identity; the data plane selects the matching rule\nper
                  request (by route), so each route can define its own cost for the
                  same metadata key."
                items:
                  description: LLMRequestCost configures each request cost.
                  properties:
                    cel:
                      description: "CEL is the CEL expression to calculate the cost
                        of the request.\nThe CEL expression must return a signed or
                        unsigned integer. If the\nreturn value is negative, it will
                        be error.\n\nThe expression can use the following variables:\n\n\t*
                        model: the model name extracted from the request content.
                        Type: string.\n\t* backend: the backend name in the form of
                        \"name.namespace\". Type: string.\n\t* input_tokens: the number
                        of input tokens. Type: unsigned integer.\n\t* cached_input_tokens:
                        the number of cached read input tokens. Type: unsigned integer.\n\t*
                        cache_creation_input_tokens: the number of cache creation
                        input tokens. Type: unsigned integer.\n\t* output_tokens:
                        the number of output tokens. Type: unsigned integer.\n\t*
                        total_tokens: the total number of tokens. Type: unsigned integer.\n\t*
                        reasoning_tokens: the number of reasoning tokens. Type: unsigned
                        integer.\n\nFor example, the following expressions are valid:\n\n\t*
                        \"model == 'llama' ?  input_tokens + output_token * 0.5 :
                        total_tokens\"\n\t* \"backend == 'foo.default' ?  input_tokens
                        + output_tokens : total_tokens\"\n\t* \"backend == 'bar.default'
                        ?  (input_tokens - cached_input_tokens) + cached_input_tokens
                        * 0.1 + cache_creation_input_tokens * 1.25 + output_tokens
                        : total_tokens\"\n\t* \"input_tokens + output_tokens + total_tokens\"\n\t*
                        \"input_tokens * output_tokens\""
                      type: string
                    metadataKey:
                      description: MetadataKey is the key of the metadata to store
                        this cost of the request.
                      type: string
                    type:
                      description: |-
                        Type specifies the type of the request cost. The default is "OutputToken",
                        and it uses "output token" as the cost. The other types are "InputToken", "TotalToken",
                        "CachedInputToken", "CacheCreationInputToken", "ReasoningToken", and "CEL".
                      enum:
                      - OutputToken
                      - InputToken
                      - CachedInputToken
                      - CacheCreationInputToken
                      - TotalToken
                      - ReasoningToken
                      - CEL
                      type: string
                  required:
                  - metadataKey
                  - type
                  type: object
                maxItems: 36
                type: array
              parentRefs:
                description: |-
                  ParentRefs are the names of the Gateway resources this AIGatewayRoute is being attached to.
                  Currently, each reference's Kind must be Gateway.
                items:
                  description: |-
                    ParentReference identifies an API object (usually a Gateway) that can be considered
                    a parent of this resource (usually a route). There are two kinds of parent resources
                    with "Core" support:

                    * Gateway (Gateway conformance profile)
                    * Service (Mesh conformance profile, ClusterIP Services only)

                    This API may be extended in the future to support additional kinds of parent
                    resources.

                    The API object must be valid in the cluster; the Group and Kind must
                    be registered in the cluster for this reference to be valid.
                  properties:
                    group:
                      default: gateway.networking.k8s.io
                      description: |-
                        Group is the group of the referent.
                        When unspecified, "gateway.networking.k8s.io" is inferred.
                        To set the core API group (such as for a "Service" kind referent),
                        Group must be explicitly set to "" (empty string).

                        Support: Core
                      maxLength: 253
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      default: Gateway
                      description: |-
                        Kind is kind of the referent.

                        There are two kinds of parent resources with "Core" support:

                        * Gateway (Gateway conformance profile)
                        * Service (Mesh conformance profile, ClusterIP Services only)

                        Support for other resources is Implementation-Specific.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    name:
                      description: |-
                        Name is the name of the referent.

                        Support: Core
                      maxLength: 253
                      minLength: 1
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the referent. When unspecified, this refers
                        to the local namespace of the Route.

                        Note that there are specific rules for ParentRefs which cross namespace
                        boundaries. Cross-namespace references are only valid if they are explicitly
                        allowed by something in the namespace they are referring to. For example:
                        Gateway has the AllowedRoutes field, and ReferenceGrant provides a
                        generic way to enable any other kind of cross-namespace reference.

                        <gateway:experimental:description>
                        ParentRefs from a Route to a Service in the same namespace are "producer"
                        routes, which apply default routing rules to inbound connections from
                        any namespace to the Service.

                        ParentRefs from a Route to a Service in a different namespace are
                        "consumer" routes, and these routing rules are only applied to outbound
                        connections originating from the same namespace as the Route, for which
                        the intended destination of the connections are a Service targeted as a
                        ParentRef of the Route.
                        </gateway:experimental:description>

                        Support: Core
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    port:
                      description: |-
                        Port is the network port this Route targets. It can be interpreted
                        differently based on the type of parent resource.

                        When the parent resource is a Gateway, this targets all listeners
                        listening on the specified port that also support this kind of Route(and
